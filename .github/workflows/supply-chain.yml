name: Supply Chain Security

on:
  push:
    branches: [ main, 'fix/**', 'feat/**', 'audit/**', 'docs/**', 'chore/**' ]
  pull_request:
    branches: [ main ]
  schedule:
    # Ejecucion semanal para detectar CVE nuevas sobre dependencias ya fijadas.
    - cron: '0 6 * * 1'

jobs:
  pip-audit:
    name: pip-audit (data-engine + viewer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pip-audit
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit data-engine (requirements.lock)
        run: |
          set -euo pipefail
          pip-audit -r data-engine/requirements.lock

      - name: Audit viewer (requirements.txt)
        run: |
          set -euo pipefail
          pip-audit -r viewer/requirements.txt
