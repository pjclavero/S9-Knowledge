name: CI

on:
  push:
    branches: [ main, 'fix/**', 'feat/**', 'audit/**', 'docs/**', 'chore/**' ]
  pull_request:
    branches: [ main ]

jobs:
  test-data-engine:
    name: Data Engine Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'data-engine/requirements.lock'

      - name: Install data-engine dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data-engine/requirements.lock

      - name: Run data engine tests
        env:
          S9K_ALLOW_REAL_INGEST: ""
        run: |
          python -m pytest data-engine/app/tests/ -v --tb=short --no-header

  test-viewer:
    name: Viewer Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'viewer/requirements.txt'

      - name: Install viewer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r viewer/requirements.txt

      - name: Run viewer tests
        env:
          S9K_ALLOW_REAL_INGEST: ""
        run: |
          python -m pytest viewer/tests/ -v --tb=short --no-header

  test-login-browser:
    name: Login browser contract (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r viewer/requirements.txt playwright uvicorn
          # --with-deps instala las librerias del sistema que el navegador
          # necesita; sin ellas chromium arranca y muere al instante.
          python -m playwright install --with-deps chromium

      - name: Run browser contract tests
        run: |
          set -euo pipefail
          cd viewer
          # El contrato (escribir = 0 POST, Enter completo = 1 POST) solo se
          # puede comprobar en un navegador de verdad. Aqui el navegador ESTA,
          # asi que saltarse los tests seria un verde que no prueba nada.
          out="$(python -m pytest tests/browser -q --no-header 2>&1)" || {
            echo "${out}"; exit 1;
          }
          echo "${out}"
          if ! grep -qE '[0-9]+ passed' <<<"${out}"; then
            echo "ERROR: los tests de navegador no llegaron a ejecutarse"
            exit 1
          fi
          if grep -qE '[0-9]+ skipped' <<<"${out}"; then
            echo "ERROR: se saltaron tests de navegador con el navegador disponible"
            exit 1
          fi

  test-combined:
    name: Combined Test Suite (no collection errors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data-engine/requirements.lock
          pip install -r viewer/requirements.txt

      - name: Run combined test suite
        env:
          S9K_ALLOW_REAL_INGEST: ""
        run: |
          python -m pytest --tb=short --no-header -q

  review-ingest-contracts:
    name: Contratos review/ingest v1 (JSON Schema)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install JSON Schema tooling
        run: |
          # Sin `|| true`: si falta jsonschema el gate falla, no pasa en verde.
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install "jsonschema>=4.18,<5.0" "pytest>=8.2,<9.0"
          python -c "import jsonschema, referencing; print('jsonschema', jsonschema.__version__)"

      - name: Validate contracts (schemas + examples + semantics)
        run: |
          set -euo pipefail
          python -m pytest contracts/review-ingest/v1/tests/ -q

  check-unicode:
    name: No dangerous Unicode (Trojan Source)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Check for dangerous Unicode characters
        run: python3 .github/scripts/check_unicode.py

  check-imports:
    name: No hardcoded absolute paths in sys.path
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for sys.path manipulation with hardcoded /opt paths
        run: |
          # Only catches actual sys.path.insert/append with /opt/ paths.
          # String literals used as configurable CLI defaults are intentional and excluded.
          if grep -rPn "sys\.path\.(insert|append)\s*\(.*['\"]\/opt" \
               --include="*.py" . 2>/dev/null; then
            echo "ERROR: sys.path manipulation with hardcoded /opt paths found"
            echo "Fix: use Path(__file__).parent to resolve paths relative to the script"
            exit 1
          fi
          echo "OK: no sys.path manipulation with hardcoded /opt paths found"

  deployment-validation:
    name: Deployment scripts validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install validation tools
        run: |
          # Sin `|| true`: si la instalacion falla hay que enterarse aqui, no
          # descubrir mas tarde que el gate paso en verde sin comprobar nada.
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          pip install yamllint ansible ansible-lint --quiet

      - name: bash syntax check
        run: |
          echo "=== bash -n ==="
          bash -n deploy/scripts/*.sh deploy/tests/*.sh
          echo "OK: todos los scripts pasan bash -n"

      # En CI la herramienta DEBE estar: si falta, el gate no se omite, falla.
      # Saltarselo en silencio convertia este job en un verde que no comprobaba
      # nada. En local, validate.sh sigue reportando SKIP (nunca PASS).
      - name: shellcheck
        run: |
          set -euo pipefail
          command -v shellcheck >/dev/null || {
            echo "ERROR: shellcheck no instalado; el gate obligatorio no puede omitirse en CI"
            exit 1
          }
          shellcheck -x -e SC1091 deploy/scripts/*.sh
          echo "OK: shellcheck"

      - name: yamllint
        run: |
          set -euo pipefail
          command -v yamllint >/dev/null || {
            echo "ERROR: yamllint no instalado; el gate obligatorio no puede omitirse en CI"
            exit 1
          }
          yamllint -d relaxed deploy/ansible/
          echo "OK: yamllint"

      - name: ansible syntax-check
        run: |
          set -euo pipefail
          command -v ansible-playbook >/dev/null || {
            echo "ERROR: ansible-playbook no instalado; el gate obligatorio no puede omitirse en CI"
            exit 1
          }
          cd deploy/ansible
          ansible-playbook site.yml --syntax-check -i inventory.example
          echo "OK: ansible syntax-check"

      - name: validate.sh
        run: bash deploy/tests/validate.sh

      - name: Unicode check
        run: python3 .github/scripts/check_unicode.py

      - name: docs consistency
        run: |
          set -euo pipefail
          pip install pyyaml --quiet
          python3 scripts/check_docs_consistency.py

      - name: No secrets in deploy scripts
        run: |
          echo "=== no secretos hardcodeados ==="
          if grep -rEn "(password|passwd|token|secret|api_key)\s*=\s*['\"][^'\"]{6,}['\"]" \
               deploy/ --include="*.sh" --include="*.yml" --include="*.yaml" \
               | grep -v '^\s*#' | grep -v 'example\|plantilla\|AVISO\|WARN'; then
            echo "ERROR: POSIBLES SECRETOS HARDCODEADOS DETECTADOS"
            exit 1
          fi
          echo "OK: sin secretos detectados"
