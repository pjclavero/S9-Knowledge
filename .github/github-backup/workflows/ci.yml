name: CI

on:
  push:
    branches: [ main, 'fix/**', 'feat/**', 'audit/**', 'docs/**', 'chore/**' ]
  pull_request:
    branches: [ main ]

jobs:
  test-data-engine:
    name: Data Engine Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'data-engine/requirements.lock'

      - name: Install data-engine dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data-engine/requirements.lock

      - name: Run data engine tests
        env:
          S9K_ALLOW_REAL_INGEST: ""
        run: |
          python -m pytest data-engine/app/tests/ -v --tb=short --no-header

  test-viewer:
    name: Viewer Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'viewer/requirements.txt'

      - name: Install viewer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r viewer/requirements.txt

      - name: Run viewer tests
        env:
          S9K_ALLOW_REAL_INGEST: ""
        run: |
          python -m pytest viewer/tests/ -v --tb=short --no-header

  test-combined:
    name: Combined Test Suite (no collection errors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data-engine/requirements.lock
          pip install -r viewer/requirements.txt

      - name: Run combined test suite
        env:
          S9K_ALLOW_REAL_INGEST: ""
        run: |
          python -m pytest --tb=short --no-header -q

  check-imports:
    name: No hardcoded absolute paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check forbidden absolute paths in Python files
        run: |
          if grep -rn "sys\.path.*['\"]\/opt\|\/opt\/knowledge-services\|\/opt\/property-graph" \
               --include="*.py" . 2>/dev/null; then
            echo "ERROR: hardcoded /opt paths found in Python files"
            exit 1
          fi
          echo "OK: no hardcoded absolute paths found"
