{% extends "base.html" %}
{% block title %}S9 Knowledge · Grafo{% endblock %}
{% block head %}
<!-- vis-network vendorizado (sin CDN): el visor funciona sin acceso a Internet.
     Fichero: viewer/app/static/js/vendor/vis-network.min.js (v9.1.9). -->
<script src="/static/js/vendor/vis-network.min.js"
        integrity="sha384-yxKDWWf0wwdUj/gPeuL11czrnKFQROnLgY8ll7En9NYoXibgg3C6NK/UDHNtUgWJ"
        crossorigin="anonymous"></script>
{% endblock %}
{% block body %}
<div class="graph-toolbar">
  <span class="pill">Workspace: <strong id="workspace-label">{{ workspace }}</strong></span>
  <input id="search-input" type="text" placeholder="Buscar (ej. Tamori)">
  <select id="type-filter">
    <option value="">Todos los tipos</option>
  </select>
  <select id="limit-select">
    <option value="100">100</option>
    <option value="300" selected>300</option>
    <option value="1000">1000</option>
  </select>
  <button class="btn" id="reload-btn">Recargar</button>
</div>
<div class="graph-layout">
  <div id="graph-canvas"></div>
  <aside id="side-panel" class="side-panel-closed">
    <button id="side-panel-close" class="side-panel-close-btn" aria-label="Cerrar panel">&#x2715;</button>
    <p class="empty-hint">Pincha un nodo o una relación para ver su ficha.</p>
  </aside>
</div>
{% endblock %}
{% block scripts %}
<script>
  window.S9K_WORKSPACE = {{ workspace | tojson }};
  window.S9K_GRAPH_LIMIT = {{ graph_limit | tojson }};
</script>
<script src="/static/js/graph.js"></script>
{% endblock %}
